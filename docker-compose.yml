services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cpp_http_server
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  http-server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      HTTP_THREAD_POOL_SIZE: 4
      HTTP_DATABASE_URL: postgresql://postgres:postgres@db:5432/cpp_http_server
    restart: unless-stopped

volumes:
  pgdata:
